name: civio
description: Civio — Offline-first Intelligent Assistant (Flutter Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  # pdf: ^3.10.8        # Temporarily disabled for Linux build (PDFium download fails)
  # printing: ^5.11.0    # Temporarily disabled for Linux build (PDFium download fails)
  share_plus: ^7.2.1
  intl: ^0.18.1
  font_awesome_flutter: ^10.6.0
  # AI & Connectivity
  http: ^1.1.0
  connectivity_plus: ^5.0.2
  get_it: ^7.6.4
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/civio_logo.svg
