<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F9B6D" />
      <stop offset="100%" stop-color="#0B6B4A" />
    </linearGradient>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF385C" />
      <stop offset="100%" stop-color="#E31C5F" />
    </linearGradient>
    <linearGradient id="grad-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBC02D" />
      <stop offset="100%" stop-color="#E07912" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0B6B4A" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background Base (Optional, for rounded icon look) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="#FFFFFF" filter="url(#shadow)" />

  <!-- The stylized C and Document motif -->
  <g transform="translate(116, 116)">
    <!-- Main Outer C (Green) -->
    <path d="M 230 50 
             A 140 140 0 1 0 230 230" 
          fill="none" 
          stroke="url(#grad-green)" 
          stroke-width="50" 
          stroke-linecap="round" />
          
    <!-- Checkmark / Inner fold (Yellow) -->
    <path d="M 120 180 L 160 220 L 250 110" 
          fill="none" 
          stroke="url(#grad-yellow)" 
          stroke-width="40" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Document lines / accent (Red) -->
    <line x1="140" y1="70" x2="220" y2="70" stroke="url(#grad-red)" stroke-width="30" stroke-linecap="round" />
  </g>
</svg>
